services:
  gnmi-app:
    build: 
      context: .
      dockerfile: ./Dockerfile
    container_name: gnmi-web-app
    # network_mode: "host"
    ports:
      # - "5000:5000"
      - "5080:80"
      - "5443:5443"
    volumes:
      - /etc/hosts:/etc/hosts
    develop:
      watch:
        - action: rebuild
          path: app.py
